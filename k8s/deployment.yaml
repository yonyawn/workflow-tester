apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-tester
  namespace: yonyawn
  labels:
    app: workflow-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-tester
  template:
    metadata:
      labels:
        app: workflow-tester
    spec:
      containers:
        - name: workflow-tester
          image: localhost:30500/workflow-tester:latest
          imagePullPolicy: Always       # always pull fresh image on pod restart
          ports:
            - containerPort: 8000       # change to whatever port your app uses
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:                # restarts pod if it becomes unresponsive
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:               # only sends traffic when app is ready
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-tester
  namespace: yonyawn
spec:
  type: ClusterIP
  selector:
    app: workflow-tester
  ports:
    - port: 80
      targetPort: 8000